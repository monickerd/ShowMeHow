services:
  screenshare:
    build: .
    restart: unless-stopped
    ports:
      - "8383:8383"
    environment:
      - PORT=8383
      # Public URL used to generate shareable room links.
      - BASE_URL=${BASE_URL:-http://localhost:8383}
      # ── TURN server (recommended for clients behind strict NAT) ──────────
      # TURN_URLS: comma-separated list of TURN/TURNS endpoints.
      # Example: turn:turn.example.com:3478,turns:turn.example.com:5349
      - TURN_URLS=${TURN_URLS:-}
      # For coturn use_auth_secret mode — set TURN_SECRET to your shared secret.
      # The server generates short-lived HMAC credentials automatically.
      - TURN_SECRET=${TURN_SECRET:-}
      # For static credentials instead, set these (leave TURN_SECRET unset):
      - TURN_USERNAME=${TURN_USERNAME:-}
      - TURN_CREDENTIAL=${TURN_CREDENTIAL:-}
